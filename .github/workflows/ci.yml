name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch main branch
        run: git fetch origin main --depth=1

      - name: Validate JSON
        run: |
          python3 -m json.tool .claude-plugin/plugin.json >/dev/null
          python3 -m json.tool .claude-plugin/marketplace.json >/dev/null

      - name: Validate marketplace
        run: python3 scripts/validate-marketplace.py --base-ref origin/main

      - name: Check plugin version bump
        run: python3 scripts/check-plugin-version-bump.py --base-ref origin/main

      - name: Install dev tools
        run: python3 -m pip install --upgrade -r requirements-dev.txt

      - name: Lint Python
        run: python3 -m ruff check scripts tests

      - name: Check Python formatting
        run: python3 -m ruff format --check scripts tests

      - name: Compile Python
        run: python3 -m py_compile scripts/validate-marketplace.py scripts/check-plugin-version-bump.py

      - name: Run tests with coverage
        run: |
          python3 -m coverage run -m unittest discover -s tests
          python3 -m coverage report --fail-under=70

      - name: Check whitespace
        run: git diff --check
