name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          find . -name "*.json" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            | while read -r file; do
              if ! python3 -m json.tool "$file" > /dev/null 2>&1; then
                echo "Invalid JSON: $file"
                exit 1
              fi
              echo "  OK: $file"
            done
          echo "All JSON files are valid."

      - name: Check plugin structure
        run: |
          echo "Checking plugin structure..."
          for plugin_dir in plugins/*/; do
            plugin_name=$(basename "$plugin_dir")

            # plugin.json must exist inside .claude-plugin/
            manifest="$plugin_dir.claude-plugin/plugin.json"
            if [ ! -f "$manifest" ]; then
              echo "Missing plugin.json in $plugin_dir.claude-plugin/"
              exit 1
            fi

            # Check for unexpected files inside .claude-plugin/
            extra=$(find "$plugin_dir.claude-plugin/" -not -name "plugin.json" -not -type d)
            if [ -n "$extra" ]; then
              echo "Unexpected files in .claude-plugin/: $extra"
              exit 1
            fi

            echo "  OK: $plugin_name"
          done
          echo "Plugin structure is valid."
